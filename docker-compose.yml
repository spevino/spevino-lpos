# Spevino Surveillance System — Main Docker Compose
# Wires together: backend API, vision pipeline, and frontend dashboard

version: "3.8"

services:
  # ─────────────────────────────────────────────────────────────
  # Backend API (FastAPI)
  # ─────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: spevino-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=RS256
      - API_BASE_URL=http://api:8000
      - CORS_ORIGINS=http://localhost:3000,http://frontend:3000
    env_file:
      - .env
    volumes:
      - ./backend/app:/app/app
      - clips:/app/clips
      - thumbnails:/app/thumbnails
    depends_on:
      - db
    networks:
      - spevino-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────────────────────────
  # CV Vision Pipeline (YOLOv8 + OpenCV)
  # ─────────────────────────────────────────────────────────────
  vision:
    build:
      context: ./vision
      dockerfile: Dockerfile
    container_name: spevino-vision
    ports:
      - "8001:8001"  # Metrics/health port
    environment:
      - API_BASE_URL=http://api:8000
      - MODEL_PATH=/app/models/yolov8n.pt
      - INFERENCE_MODE=cpu  # cpu or gpu
      - DETECTION_THRESHOLD=0.75
      - MAX_CAMERAS=8
    volumes:
      - ./vision/src:/app/src
      - ./vision/models:/app/models
      - clips:/app/clips
    depends_on:
      - api
    networks:
      - spevino-net
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 0  # Set to 1 if GPU available
              capabilities: [gpu]

  # ─────────────────────────────────────────────────────────────
  # Frontend Dashboard (Next.js 14)
  # ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: spevino-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000
      - NEXT_PUBLIC_WS_URL=ws://api:8000
    volumes:
      - ./frontend/app:/app/app
      - ./frontend/components:/app/components
    depends_on:
      - api
    networks:
      - spevino-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────────────────────────
  # Database (Turso SQLite — local dev fallback)
  # ─────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: spevino-db
    environment:
      - POSTGRES_USER=spevino
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-spevino_dev_password}
      - POSTGRES_DB=spevino
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - spevino-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spevino"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────────────────────────
  # Redis (For WebSocket pub/sub and job queue)
  # ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: spevino-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - spevino-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  spevino-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  clips:
  thumbnails: